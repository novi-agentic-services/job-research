<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SA Insurance Job Dashboard</title>
  <meta name="description" content="Mobile-friendly dashboard of South African short-term insurance jobs." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div>
        <h1>Job Dashboard</h1>
        <p>SA short-term insurance roles (pricing, underwriting, reinsurance, product, actuarial, AI/ML)</p>
      </div>
      <div class="pill" id="countPill">Loading…</div>
    </div>
  </header>

  <main class="container">
    <section class="filters">
      <label>Search
        <input id="searchInput" type="text" placeholder="e.g. actuary, pricing, data scientist" />
      </label>
      <label>Company
        <select id="companyFilter"><option value="">All companies</option></select>
      </label>
      <label>Country
        <select id="countryFilter"><option value="">All countries</option></select>
      </label>
      <label>Status
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="Open">Open</option>
          <option value="Verify">Verify</option>
        </select>
      </label>
    </section>

    <section class="stats" id="stats"></section>
    <section class="cards" id="cards"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
